  # https://github.com/rust-lang/rustfmt
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: {{ pin_github_action("actions/checkout", "v6") }}
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
