# Adjust the target triple to match your chip.
# Common targets:
#   thumbv6m-none-eabi    — Cortex-M0/M0+
#   thumbv7m-none-eabi    — Cortex-M3
#   thumbv7em-none-eabi   — Cortex-M4/M7 (no FPU)
#   thumbv7em-none-eabihf — Cortex-M4F/M7F (hardware FPU)
#   thumbv8m.main-none-eabihf — Cortex-M33 (nRF9160, RP2350)
#   riscv32imc-unknown-none-elf — RISC-V (ESP32-C3)
{%- if hal == "stm32f0" or hal == "stm32l0" %}
[build]
target = "thumbv6m-none-eabi"
{%- elif hal == "stm32f1" %}
[build]
target = "thumbv7m-none-eabi"
{%- elif hal == "stm32f3" or hal == "stm32f4" or hal == "stm32f7" or hal == "stm32h7" or hal == "stm32l4" or hal == "nrf52832" or hal == "nrf52840" %}
[build]
target = "thumbv7em-none-eabihf"
{%- elif hal == "nrf9160" or hal == "rp2350" %}
[build]
target = "thumbv8m.main-none-eabihf"
{%- elif hal == "rp2040" or hal == "atsamd" %}
[build]
target = "thumbv6m-none-eabi"
{%- elif hal == "esp32c3" %}
[build]
target = "riscv32imc-unknown-none-elf"
{%- elif hal == "esp32" or hal == "esp32s3" %}
[build]
target = "xtensa-esp32-none-elf"
{%- endif %}

[target.'cfg(all(target_arch = "arm", target_os = "none"))']
runner = "probe-rs run --chip $CHIP"
rustflags = ["-C", "link-arg=-Tlink.x"]

[target.'cfg(all(target_arch = "riscv32", target_os = "none"))']
runner = "espflash flash --monitor"
