[package]
name = "{{ project_name }}"
version = "0.1.0"
edition = "2024"
description = "{{ description }}"
publish = false

[dependencies]
embedded-hal.bp-managed = true
critical-section.bp-managed = true
defmt.bp-managed = true
defmt-rtt.bp-managed = true
{%- if concurrency == "embassy" %}
embassy-executor.bp-managed = true
embassy-time.bp-managed = true
{%- elif concurrency == "rtic" %}
rtic.bp-managed = true
{%- endif %}

# Target HAL
{%- if hal == "stm32f0" %}
stm32f0xx-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "stm32f1" %}
stm32f1xx-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "stm32f3" %}
stm32f3xx-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "stm32f4" %}
stm32f4xx-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "stm32f7" %}
stm32f7xx-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "stm32h7" %}
stm32h7xx-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "stm32l0" %}
stm32l0xx-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "stm32l4" %}
stm32l4xx-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "nrf52832" %}
nrf52832-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "nrf52840" %}
nrf52840-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "nrf9160" %}
nrf9160-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "rp2040" %}
rp2040-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- elif hal == "esp32" or hal == "esp32c3" or hal == "esp32s3" %}
esp-hal.bp-managed = true
{%- elif hal == "atsamd" %}
atsamd-hal.bp-managed = true
cortex-m = { bp-managed = true, features = ["critical-section-single-core"] }
cortex-m-rt.bp-managed = true
{%- endif %}

[profile.release]
opt-level = "s"
lto = true
debug = true
