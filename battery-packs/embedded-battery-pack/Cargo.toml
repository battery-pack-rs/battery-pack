[package]
name = "embedded-battery-pack"
version = "0.1.1"
edition = "2024"
description = "Opinionated battery pack for embedded Rust — curates HALs, drivers, RTOSes, and no_std utilities from the awesome-embedded-rust ecosystem"
license = "MIT OR Apache-2.0"
repository = "https://github.com/battery-pack-rs/battery-pack"
keywords = ["battery-pack", "embedded", "no-std", "hal", "cortex-m"]

[package.metadata.battery-pack]
hidden = ["battery-pack", "bphelper-manifest", "snapbox"]

[package.metadata.battery.templates]
blinky = { path = "templates/blinky", description = "Minimal blinky LED example for your chosen HAL + concurrency model" }

# ─── Categories ───────────────────────────────────────────────────────────────

[package.metadata.battery-pack.categories.hal]
title = "Hardware Abstraction Layer"
description = "Pick the HAL for your target chip family (mutually exclusive)"
pick = "at-most-one"

[package.metadata.battery-pack.categories.concurrency]
title = "Concurrency Framework"
description = "Pick your async/RTOS model (mutually exclusive)"
pick = "at-most-one"

[package.metadata.battery-pack.categories.panic]
title = "Panic Handler"
description = "Choose how panics are surfaced on the device (mutually exclusive)"
pick = "at-most-one"

[package.metadata.battery-pack.categories.logging]
title = "Logging & Debugging"
description = "Device logging and diagnostic tools"

[package.metadata.battery-pack.categories.portable]
title = "Portable Ecosystem"
description = "Trait abstractions and utilities that work across any HAL"

[package.metadata.battery-pack.categories.drivers]
title = "Popular Drivers"
description = "Platform-agnostic peripheral/sensor drivers via embedded-hal"

[package.metadata.battery-pack.categories.networking]
title = "Networking"
description = "no_std networking stacks and protocols"

[package.metadata.battery-pack.categories.storage]
title = "Storage & Memory"
description = "Flash, EEPROM, and filesystem support"

[package.metadata.battery-pack.categories.display]
title = "Display & Graphics"
description = "Screens, LEDs, and 2D drawing"

[package.metadata.battery-pack.categories.tools]
title = "Dev Tools"
description = "Testing, flashing, and development utilities"

