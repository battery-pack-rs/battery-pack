# ─── Dependencies ─────────────────────────────────────────────────────────────

[dependencies]
# Portable ecosystem (always available when feature-gated)
embedded-hal = { version = "1", optional = true }
embedded-io = { version = "0.6", optional = true }
embedded-storage = { version = "0.3", optional = true }
heapless = { version = "0.8", optional = true }
critical-section = { version = "1", optional = true }

# Architecture support
cortex-m = { version = "0.7", features = ["critical-section-single-core"], optional = true }
cortex-m-rt = { version = "0.7", optional = true }

# STM32 HALs
stm32f0xx-hal = { version = "0.18", optional = true }
stm32f1xx-hal = { version = "0.10", optional = true }
stm32f3xx-hal = { version = "0.10", optional = true }
stm32f4xx-hal = { version = "0.22", optional = true }
stm32f7xx-hal = { version = "0.8", optional = true }
stm32h7xx-hal = { version = "0.16", optional = true }
stm32l0xx-hal = { version = "0.10", optional = true }
stm32l4xx-hal = { version = "0.7", optional = true }

# Nordic HALs
nrf52832-hal = { version = "0.19", optional = true }
nrf52840-hal = { version = "0.19", optional = true }
nrf9160-hal = { version = "0.18", optional = true }

# Raspberry Pi Silicon
rp2040-hal = { version = "0.10", optional = true }

# Espressif
esp-hal = { version = "1", optional = true }

# Microchip SAMD
atsamd-hal = { version = "0.23", optional = true }

# Concurrency frameworks
embassy-executor = { version = "0.10", optional = true }
embassy-time = { version = "0.5", optional = true }
embassy-sync = { version = "0.8", optional = true }
rtic = { version = "2", optional = true }

# Panic handlers
panic-halt = { version = "1", optional = true }
panic-probe = { version = "1", features = ["print-defmt"], optional = true }
panic-rtt-target = { version = "0.2", optional = true }
cortex-m-semihosting = { version = "0.5", optional = true }

# Logging & debugging
defmt = { version = "1", optional = true }
defmt-rtt = { version = "1", optional = true }
rtt-target = { version = "0.6", optional = true }

# Drivers — displays
ssd1306 = { version = "0.10", optional = true }
st7789 = { version = "0.7", optional = true }
embedded-graphics = { version = "0.8", optional = true }

# Drivers — sensors
bme280 = { version = "0.5", optional = true }
lis3dh = { version = "0.4", optional = true }

# Drivers — radio
# NOTE: radio-sx127x omitted due to stale transitive deps that conflict with esp-hal.
# Users should add LoRa drivers directly to their project when needed.

# Drivers — USB
usb-device = { version = "0.3", optional = true }
usbd-serial = { version = "0.2", optional = true }

# Networking
smoltcp = { version = "0.13", default-features = false, features = ["medium-ethernet", "proto-ipv4", "socket-tcp"], optional = true }

# Storage
embedded-sdmmc = { version = "0.9", optional = true }
spi-memory = { version = "0.2", optional = true }

# Dev tools
embedded-test = { version = "0.7", optional = true }
embedded-hal-mock = { version = "0.11", optional = true }

[build-dependencies]
battery-pack = { workspace = true, features = ["build"] }

[dev-dependencies]
battery-pack = { workspace = true, features = ["cli"] }
bphelper-manifest = { path = "../../src/battery-pack/bphelper-manifest" }
snapbox = "1"

# ─── Features ─────────────────────────────────────────────────────────────────

[features]
default = ["embedded-hal", "critical-section-impl"]

# HAL features (exclusive within category)
stm32f0 = ["stm32f0xx-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
stm32f1 = ["stm32f1xx-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
stm32f3 = ["stm32f3xx-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
stm32f4 = ["stm32f4xx-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
stm32f7 = ["stm32f7xx-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
stm32h7 = ["stm32h7xx-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
stm32l0 = ["stm32l0xx-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
stm32l4 = ["stm32l4xx-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
nrf52832 = ["nrf52832-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
nrf52840 = ["nrf52840-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
nrf9160 = ["nrf9160-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
rp2040 = ["rp2040-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]
esp32 = ["esp-hal", "embedded-hal"]
esp32c3 = ["esp-hal", "embedded-hal"]
esp32s3 = ["esp-hal", "embedded-hal"]
atsamd = ["atsamd-hal", "embedded-hal", "dep:cortex-m", "cortex-m-rt", "critical-section-impl"]

# Concurrency frameworks (exclusive within category)
embassy = ["embassy-executor", "embassy-time", "embassy-sync"]
rtic = ["dep:rtic", "cortex-m"]

# Architecture support (exclusive within category)
cortex-m = ["dep:cortex-m", "cortex-m-rt", "critical-section-impl"]

# Panic handlers (exclusive within category)
panic-halt = ["dep:panic-halt", "dep:defmt", "dep:defmt-rtt"]
panic-probe = ["dep:panic-probe", "dep:defmt", "dep:defmt-rtt"]
panic-rtt = ["dep:panic-rtt-target", "dep:defmt", "dep:defmt-rtt"]
panic-semihosting = ["dep:cortex-m-semihosting"]

# Logging & debugging
defmt-logging = ["dep:defmt", "dep:defmt-rtt"]
rtt-target = ["dep:rtt-target"]

# Portable ecosystem
heapless-alloc = ["heapless"]
critical-section-impl = ["critical-section"]

# Drivers — displays
display-ssd1306 = ["ssd1306", "embedded-graphics"]
display-st7789 = ["st7789", "embedded-graphics"]
embedded-graphics = ["dep:embedded-graphics"]

# Drivers — sensors
sensor-bme280 = ["bme280"]
sensor-lis3dh = ["lis3dh"]

# Drivers — radio (radio-sx127x removed due to dep conflicts; feature kept as placeholder)
# radio-lora = []

# USB
usb-device = ["dep:usb-device", "usbd-serial"]

# Networking
smoltcp-stack = ["smoltcp"]

# Storage
embedded-sdmmc = ["dep:embedded-sdmmc"]
spi-flash = ["spi-memory"]

# Dev tools
embedded-test = ["dep:embedded-test"]
embedded-hal-mock = ["dep:embedded-hal-mock"]
